<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32" role="img" aria-label="Grafana Desktop favicon">
  <!-- Transparent background for better rendering on various browsers/themes -->
  <defs>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0ea5e9"/>
      <stop offset="100%" stop-color="#7dd3fc"/>
    </linearGradient>
  </defs>
  <!-- Simple four-pane motif matching site accents -->
  <rect x="3" y="3" width="11" height="11" rx="2.2" fill="url(#accent)"/>
  <rect x="18" y="3" width="11" height="11" rx="2.2" fill="#22d3ee"/>
  <rect x="3" y="18" width="11" height="11" rx="2.2" fill="#22d3ee"/>
  <rect x="18" y="18" width="11" height="11" rx="2.2" fill="url(#accent)"/>
</svg>